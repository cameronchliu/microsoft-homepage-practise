<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>微軟仿切練習</title>
    <link rel="stylesheet" href="./css/microsoft-1.css">
</head>

<body>
    <nav class="container-normal">導覽列</nav>
    <header class="container-full">
        <!-- 頁首(輪播) -->
        <picture>
            <source media="(min-width: 1400px)" srcset="./ms-imgs/swiper/1-1920x600.avif">
            <source media="(min-width: 1080px)" srcset="./ms-imgs/swiper/1-1399x600.avif">
            <source media="(min-width: 860px)" srcset="./ms-imgs/swiper/1-1083x600.avif">
            <source media="(min-width: 540px)" srcset="./ms-imgs/swiper/1-859x540.avif">
            <img class="w-100" src="./ms-imgs/swiper/1-859x540.avif" alt="導覽列圖片">
        </picture>
    </header>
    <main class="container-normal">主要內容
        <section class="three-choice">三個選擇</section>
        <section class="four-card">
            <div class="one-card">AA</div>
            <div class="one-card">AA</div>
            <div class="one-card">AA</div>
            <div class="one-card">AA</div>
        </section>
        <section class="big-img">
            一張大圖
            <picture>
                <source media="(min-width: 1400px)" srcset="./ms-imgs/big-img/1-1596x600.avif">
                <source media="(min-width: 1080px)" srcset="./ms-imgs/big-img/2-1260x600.avif">
                <source media="(min-width: 860px)" srcset="./ms-imgs/big-img/3-1083x600.avif">
                <source media="(min-width: 540px)" srcset="./ms-imgs/big-img/4-859x540.avif">
                <img class="w-100" src="./ms-imgs/big-img/4-859x540.avif" alt="大圖">
            </picture>
        </section>
        <section class="four-card">四張卡片</section>
        <section class="other">其他</section>
        <div class="go-top">回到首頁</div>
    </main>
    <footer>頁尾</footer>
</body>

</html>
